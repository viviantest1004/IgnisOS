## IgnisOS GRUB Configuration — ARM64
## MIT License

set default=1
set timeout=5
set timeout_style=menu

set menu_color_normal=cyan/black
set menu_color_highlight=white/blue

menuentry "⚡ IgnisOS — Uptime Kernel" --class ignis {
  echo "Loading Uptime Kernel..."
  linux   /boot/vmlinuz root=LABEL=ignis-root ro quiet \
          init=/usr/bin/ignis-uptime-boot
  initrd  /boot/initrd.img
}

menuentry "🔥 IgnisOS — Desktop (GNOME)" --class ubuntu {
  echo "Loading IgnisOS Desktop..."
  linux   /boot/vmlinuz root=LABEL=ignis-root ro quiet splash
  initrd  /boot/initrd.img
}

submenu "🛠️  Recovery & Tools ▸" {

  menuentry "🛠️  Recovery Mode" --class recovery {
    linux   /boot/vmlinuz root=LABEL=ignis-root ro single \
            init=/ignis-recovery/recovery.sh
    initrd  /boot/initrd.img
  }

  menuentry "⚡ Uptime Kernel (Recovery)" --class ignis {
    linux   /boot/vmlinuz root=LABEL=ignis-root ro \
            init=/usr/bin/ignis-uptime-boot
    initrd  /boot/initrd.img
  }

  menuentry "🔍 파일시스템 검사 (fsck)" --class tool {
    linux   /boot/vmlinuz root=LABEL=ignis-root ro \
            init=/sbin/fsck.ext4 -- /dev/sda1
    initrd  /boot/initrd.img
  }

  menuentry "🖥️  복구 셸 (root bash)" --class recovery {
    linux   /boot/vmlinuz root=LABEL=ignis-root ro single \
            systemd.unit=rescue.target
    initrd  /boot/initrd.img
  }

  menuentry "🔄 공장 초기화 (Factory Reset)" --class recovery {
    linux   /boot/vmlinuz root=LABEL=ignis-root ro single \
            init=/ignis-recovery/recovery.sh ignis.reset=1
    initrd  /boot/initrd.img
  }

  menuentry "🌐 네트워크 복구 모드" --class recovery {
    linux   /boot/vmlinuz root=LABEL=ignis-root ro single \
            init=/ignis-recovery/recovery.sh ignis.net=1
    initrd  /boot/initrd.img
  }

  menuentry "💾 메모리 검사 (memtest)" {
    linux16 /boot/memtest86+.bin
  }

}

menuentry "🔄 UEFI Firmware Settings" --class firmware {
  fwsetup
}
