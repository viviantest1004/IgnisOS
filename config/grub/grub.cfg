## IgnisOS GRUB Configuration — ARM64 Live ISO

set default=0
set timeout=5
set timeout_style=menu

menuentry "🔥 IgnisOS — Desktop (Live)" --class ubuntu {
  echo "Loading IgnisOS Desktop..."
  linux  /boot/vmlinuz boot=casper quiet splash ---
  initrd /boot/initrd.img
}

menuentry "🔥 IgnisOS — Desktop (안전 모드)" --class ubuntu {
  echo "Loading IgnisOS (safe mode)..."
  linux  /boot/vmlinuz boot=casper xforcevesa quiet splash ---
  initrd /boot/initrd.img
}

submenu "🛠️  Recovery & Tools ▸" {

  menuentry "🛠️  Recovery Mode" --class recovery {
    linux  /boot/vmlinuz boot=casper single ---
    initrd /boot/initrd.img
  }

  menuentry "🖥️  복구 셸 (root bash)" --class recovery {
    linux  /boot/vmlinuz boot=casper systemd.unit=rescue.target ---
    initrd /boot/initrd.img
  }

}

menuentry "🔄 UEFI Firmware Settings" --class firmware {
  fwsetup
}
