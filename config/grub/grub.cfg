## IgnisOS GRUB Configuration — ARM64 Live ISO

set default=0
set timeout=5
set timeout_style=menu

insmod gzio
insmod all_video
insmod gfxterm
insmod iso9660
insmod part_gpt
insmod part_msdos
insmod fat
insmod linux

# ISO 볼륨에서 casper 루트 검색
if search --no-floppy --file --set=root /casper/filesystem.squashfs; then
  echo "Found ISO root"
else
  search --no-floppy --label --set=root "IGNISROOT"
fi

menuentry "Loading IgnisOS Desktop..." --class ubuntu {
  echo "Loading IgnisOS Desktop..."
  linux  /casper/vmlinuz boot=casper nomodeset quiet splash ---
  initrd /casper/initrd
}

menuentry "IgnisOS — Safe Mode" --class ubuntu {
  echo "Loading IgnisOS (safe mode)..."
  linux  /casper/vmlinuz boot=casper nomodeset xforcevesa quiet splash ---
  initrd /casper/initrd
}

submenu "Recovery & Tools" {

  menuentry "Recovery Mode" --class recovery {
    linux  /casper/vmlinuz boot=casper single ---
    initrd /casper/initrd
  }

  menuentry "Root Shell" --class recovery {
    linux  /casper/vmlinuz boot=casper systemd.unit=rescue.target ---
    initrd /casper/initrd
  }

}

menuentry "UEFI Firmware Settings" --class firmware {
  fwsetup
}
