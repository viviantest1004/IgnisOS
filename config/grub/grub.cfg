## IgnisOS GRUB Configuration
## ARM64 · MIT License

set default=0
set timeout=5
set timeout_style=menu

# 색상 설정
set menu_color_normal=cyan/black
set menu_color_highlight=white/blue

# 배경
if background_image /boot/grub/ignis-bg.png; then
  true
else
  set color_normal=cyan/black
  set color_highlight=white/blue
fi

# ── 메뉴 엔트리 ─────────────────────────────────────

menuentry "🔥 IgnisOS — Uptime Kernel" --class ignis {
  echo "Loading Uptime Kernel..."
  linux   /boot/uptime-kernel-boot root=LABEL=ignis-root ro quiet
  initrd  /boot/initrd.img
}

menuentry "🖥️  IgnisOS — Desktop (GNOME)" --class ubuntu {
  echo "Loading IgnisOS Desktop..."
  linux   /boot/vmlinuz root=LABEL=ignis-root ro quiet splash
  initrd  /boot/initrd.img
}

menuentry "🛠️  IgnisOS — Recovery Mode" --class recovery {
  linux   /boot/vmlinuz root=LABEL=ignis-root ro single
  initrd  /boot/initrd.img
}

menuentry "🔄  UEFI Firmware Settings" --class firmware {
  fwsetup
}
