name: Build IgnisOS ARM64 ISO

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version'
        required: false
        default: 'dev'

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version || 'dev' }}" >> $GITHUB_OUTPUT
          fi

      - name: Free disk space
        run: |
          sudo rm -rf \
            /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" \
            /usr/share/swift /usr/local/.ghcup \
            /usr/lib/jvm /usr/lib/mono /opt/hostedtoolcache
          sudo docker system prune -af 2>/dev/null || true
          sudo apt-get clean
          df -h

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            squashfs-tools xorriso grub-efi-arm64-bin mtools wget xz-utils

      - name: Download Ubuntu base rootfs
        run: |
          mkdir -p build/rootfs
          wget -q \
            "https://cloud-images.ubuntu.com/minimal/releases/noble/release/ubuntu-24.04-minimal-cloudimg-arm64-root.tar.xz" \
            -O /tmp/ubuntu-base.tar.xz
          sudo tar -xJf /tmp/ubuntu-base.tar.xz -C build/rootfs
          rm /tmp/ubuntu-base.tar.xz
          echo "Base: $(sudo du -sh build/rootfs | cut -f1)"
          df -h

      - name: Copy IgnisOS apps into rootfs
        run: |
          sudo mkdir -p build/rootfs/usr/share/ignis
          for app in ignis-shell ignis-settings ignis-files ignis-calc \
                     ignis-terminal ignis-notepad ignis-clock ignis-taskmanager \
                     ignis-recovery ignis-oobe \
                     ignis-imageviewer ignis-music ignis-video \
                     ignis-calendar ignis-screenshot ignis-archive ignis-sysinfo; do
            [ -d "$app" ] && sudo cp -r "$app" build/rootfs/usr/share/ignis/
          done

      - name: Run chroot setup
        run: |
          sudo cp .github/chroot-setup.sh build/rootfs/tmp/setup.sh
          sudo chmod +x build/rootfs/tmp/setup.sh
          # DNS 설정 (symlink 제거 후 실제 파일 복사)
          sudo rm -f build/rootfs/etc/resolv.conf
          sudo cp /etc/resolv.conf build/rootfs/etc/resolv.conf
          sudo mount --bind /proc    build/rootfs/proc
          sudo mount --bind /sys     build/rootfs/sys
          sudo mount --bind /dev     build/rootfs/dev
          sudo mount --bind /dev/pts build/rootfs/dev/pts
          sudo chroot build/rootfs /tmp/setup.sh
          RESULT=$?
          sudo umount build/rootfs/dev/pts build/rootfs/dev \
                      build/rootfs/sys build/rootfs/proc 2>/dev/null || true
          [ $RESULT -ne 0 ] && exit 1
          echo "Rootfs ready: $(sudo du -sh build/rootfs | cut -f1)"
          df -h

      - name: Build ISO
        run: |
          VER="${{ steps.ver.outputs.version }}"
          ISO_DIR=build/iso
          ROOTFS=build/rootfs
          mkdir -p "${ISO_DIR}/boot/grub" "${ISO_DIR}/EFI/BOOT" "${ISO_DIR}/casper"

          # Kernel + initrd
          VMLINUZ=$(sudo ls "${ROOTFS}/boot/" | grep '^vmlinuz-' | tail -1 || true)
          INITRD=$(sudo ls  "${ROOTFS}/boot/" | grep '^initrd.img-' | tail -1 || true)
          if [ -z "${VMLINUZ}" ]; then
            echo "ERROR: kernel not found in rootfs/boot/"; exit 1
          fi
          sudo cp "${ROOTFS}/boot/${VMLINUZ}" "${ISO_DIR}/casper/vmlinuz"
          sudo cp "${ROOTFS}/boot/${INITRD}"  "${ISO_DIR}/casper/initrd"
          sudo chmod 644 "${ISO_DIR}/casper/vmlinuz" "${ISO_DIR}/casper/initrd"

          # SquashFS
          sudo mksquashfs "${ROOTFS}" "${ISO_DIR}/casper/filesystem.squashfs" \
            -comp gzip -e boot -e proc -e sys -noappend
          sudo chmod 644 "${ISO_DIR}/casper/filesystem.squashfs"
          echo "Squashfs: $(du -sh ${ISO_DIR}/casper/filesystem.squashfs | cut -f1)"

          # rootfs + build 디렉토리 전체 삭제 (디스크 확보)
          sudo rm -rf "${ROOTFS}" build/rootfs
          sudo apt-get clean
          df -h

          # GRUB config (casper 경로로 치환)
          sed 's|/boot/vmlinuz|/casper/vmlinuz|g; s|/boot/initrd.img|/casper/initrd|g' \
            config/grub/grub.cfg > "${ISO_DIR}/boot/grub/grub.cfg"

          # UEFI BOOTAA64.EFI
          grub-mkstandalone \
            --format=arm64-efi \
            --output="${ISO_DIR}/EFI/BOOT/BOOTAA64.EFI" \
            --modules="part_gpt fat iso9660 linux normal boot configfile \
              loopback chain efifwsetup efi_gop ls search search_label \
              search_fs_uuid search_fs_file gfxterm all_video loadenv ext2" \
            "boot/grub/grub.cfg=${ISO_DIR}/boot/grub/grub.cfg"

          # EFI 파티션 이미지 (mtools로 직접 포맷)
          EFI_IMG="${ISO_DIR}/boot/grub/efi.img"
          truncate -s 10M "${EFI_IMG}"
          mformat -i "${EFI_IMG}" -F ::
          mmd    -i "${EFI_IMG}" ::/EFI ::/EFI/BOOT
          mcopy  -i "${EFI_IMG}" "${ISO_DIR}/EFI/BOOT/BOOTAA64.EFI" \
            ::/EFI/BOOT/BOOTAA64.EFI

          sudo chmod -R a+rX "${ISO_DIR}"

          # ISO 빌드
          sudo xorriso -as mkisofs \
            -r -V "IgnisOS_${VER}" \
            -J -joliet-long \
            -no-emul-boot \
            -e boot/grub/efi.img \
            -isohybrid-gpt-basdat \
            -o "IgnisOS-${VER}-arm64.iso" "${ISO_DIR}"
          echo "ISO: $(du -sh IgnisOS-${VER}-arm64.iso | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: IgnisOS-${{ steps.ver.outputs.version }}-arm64
          path: IgnisOS-${{ steps.ver.outputs.version }}-arm64.iso
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: IgnisOS ${{ steps.ver.outputs.version }}
          body: |
            ## IgnisOS ${{ steps.ver.outputs.version }} — ARM64 Live ISO

            ### UTM (Apple M-series)
            1. UTM 설치 → `+` → **Virtualize** → **Linux**
            2. ISO 선택 → RAM 2048MB+ → 20GB 디스크 → 저장 → 실행

            ### QEMU
            ```bash
            qemu-system-aarch64 -M virt -cpu cortex-a72 -m 2048 \
              -bios /usr/share/qemu-efi-aarch64/QEMU_EFI.fd \
              -drive if=virtio,format=raw,file=IgnisOS-${{ steps.ver.outputs.version }}-arm64.iso \
              -device virtio-gpu-pci -display sdl \
              -device usb-kbd -device usb-mouse -usb
            ```
          files: IgnisOS-${{ steps.ver.outputs.version }}-arm64.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
