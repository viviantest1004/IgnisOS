name: Build IgnisOS ARM64 ISO

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version'
        required: false
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version || '1.0.0' }}" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install host tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends squashfs-tools xorriso

      - name: Build ARM64 rootfs
        run: |
          mkdir -p build/rootfs
          docker buildx build \
            --platform linux/arm64 \
            --load \
            -t ignis-rootfs:build \
            -f .github/Dockerfile.ignis \
            .
          CID=$(docker create --platform linux/arm64 ignis-rootfs:build)
          docker export "$CID" | sudo tar -x -C build/rootfs
          docker rm "$CID"
          echo "Rootfs: $(du -sh build/rootfs | cut -f1)"

      - name: Build ISO
        run: |
          VER="${{ steps.ver.outputs.version }}"
          ISO_DIR=build/iso
          ROOTFS=build/rootfs
          mkdir -p "${ISO_DIR}/boot/grub"

          VMLINUZ=$(sudo ls "${ROOTFS}/boot/" | grep '^vmlinuz-' | tail -1 || true)
          INITRD=$(sudo ls "${ROOTFS}/boot/"  | grep '^initrd.img-' | tail -1 || true)
          [ -n "${VMLINUZ}" ] && sudo cp "${ROOTFS}/boot/${VMLINUZ}" "${ISO_DIR}/boot/vmlinuz" && sudo chmod 644 "${ISO_DIR}/boot/vmlinuz"
          [ -n "${INITRD}"  ] && sudo cp "${ROOTFS}/boot/${INITRD}"  "${ISO_DIR}/boot/initrd.img" && sudo chmod 644 "${ISO_DIR}/boot/initrd.img"

          sudo mksquashfs "${ROOTFS}" "${ISO_DIR}/boot/filesystem.squashfs" \
            -comp xz -e boot -e proc -e sys -noappend
          sudo chmod 644 "${ISO_DIR}/boot/filesystem.squashfs"
          echo "Squashfs: $(du -sh ${ISO_DIR}/boot/filesystem.squashfs | cut -f1)"

          cp config/grub/grub.cfg "${ISO_DIR}/boot/grub/grub.cfg"

          sudo chmod -R a+rX "${ISO_DIR}"

          sudo xorriso -as mkisofs -r -V "IgnisOS_${VER}" \
            -o "build/IgnisOS-${VER}-arm64.iso" "${ISO_DIR}"
          echo "ISO: $(du -sh build/IgnisOS-${VER}-arm64.iso | cut -f1)"

          cp "build/IgnisOS-${VER}-arm64.iso" "IgnisOS-${VER}-live-arm64.iso"
          cp "build/IgnisOS-${VER}-arm64.iso" "IgnisOS-${VER}-install-arm64.iso"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: IgnisOS-${{ steps.ver.outputs.version }}-arm64
          path: |
            IgnisOS-${{ steps.ver.outputs.version }}-live-arm64.iso
            IgnisOS-${{ steps.ver.outputs.version }}-install-arm64.iso
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: IgnisOS ${{ steps.ver.outputs.version }}
          body: |
            ## 🔥 IgnisOS ${{ steps.ver.outputs.version }} — ARM64 Linux

            > **ARM64 only** — Raspberry Pi 4/5, Apple M1/M2/M3/M4 (UTM), QEMU, AWS Graviton

            ### Run on Apple M-series (UTM)
            1. Download [UTM](https://mac.getutm.app/)
            2. `+` → **Virtualize** → **Linux**
            3. Select the ISO → RAM 2048MB+ → 20GB disk → Save → Play

            ### Run in QEMU
            ```bash
            qemu-system-aarch64 -M virt -cpu cortex-a72 -m 2048 \
              -bios /usr/share/qemu-efi-aarch64/QEMU_EFI.fd \
              -drive if=virtio,format=raw,file=IgnisOS-${{ steps.ver.outputs.version }}-live-arm64.iso \
              -device virtio-gpu-pci -display sdl \
              -device usb-kbd -device usb-mouse -usb
            ```
          files: |
            IgnisOS-${{ steps.ver.outputs.version }}-live-arm64.iso
            IgnisOS-${{ steps.ver.outputs.version }}-install-arm64.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
