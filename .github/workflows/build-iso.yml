name: Build IgnisOS ARM64 ISO

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version'
        required: false
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version || '1.0.0' }}" >> $GITHUB_OUTPUT
          fi

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" \
                      /usr/share/swift /usr/local/.ghcup
          sudo apt-get remove -y '^dotnet-.*' '^llvm-.*' 'php.*' \
            azure-cli google-cloud-cli google-chrome-stable \
            firefox powershell mono-devel 2>/dev/null || true
          sudo apt-get autoremove -y
          sudo apt-get clean
          docker system prune -af || true
          df -h

      - name: Install host tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            squashfs-tools xorriso grub-efi-arm64-bin mtools
          sudo systemctl start docker || true

      - name: Build ARM64 rootfs (native, no QEMU)
        run: |
          mkdir -p build/rootfs
          docker build \
            --load \
            -t ignis-rootfs:build \
            -f .github/Dockerfile.ignis \
            .
          CID=$(docker create ignis-rootfs:build)
          docker export "$CID" | sudo tar -x -C build/rootfs
          docker rm "$CID"
          docker rmi ignis-rootfs:build || true
          docker system prune -af || true
          df -h
          echo "Rootfs: $(du -sh build/rootfs | cut -f1)"

      - name: Build ISO
        run: |
          VER="${{ steps.ver.outputs.version }}"
          ISO_DIR=build/iso
          ROOTFS=build/rootfs
          mkdir -p "${ISO_DIR}/boot/grub" "${ISO_DIR}/EFI/BOOT" "${ISO_DIR}/casper"

          # Kernel + initrd (casper expects them under /casper/)
          VMLINUZ=$(sudo ls "${ROOTFS}/boot/" | grep '^vmlinuz-' | tail -1 || true)
          INITRD=$(sudo ls "${ROOTFS}/boot/"  | grep '^initrd.img-' | tail -1 || true)
          [ -n "${VMLINUZ}" ] && sudo cp "${ROOTFS}/boot/${VMLINUZ}" "${ISO_DIR}/casper/vmlinuz" && sudo chmod 644 "${ISO_DIR}/casper/vmlinuz"
          [ -n "${INITRD}"  ] && sudo cp "${ROOTFS}/boot/${INITRD}"  "${ISO_DIR}/casper/initrd" && sudo chmod 644 "${ISO_DIR}/casper/initrd"

          # SquashFS rootfs under /casper/ (casper standard)
          sudo mksquashfs "${ROOTFS}" "${ISO_DIR}/casper/filesystem.squashfs" \
            -comp gzip -e boot -e proc -e sys -noappend
          sudo chmod 644 "${ISO_DIR}/casper/filesystem.squashfs"
          echo "Squashfs: $(du -sh ${ISO_DIR}/casper/filesystem.squashfs | cut -f1)"

          # GRUB config (update paths to /casper/)
          sed 's|/boot/vmlinuz|/casper/vmlinuz|g; s|/boot/initrd.img|/casper/initrd|g' \
            config/grub/grub.cfg > "${ISO_DIR}/boot/grub/grub.cfg"

          # UEFI EFI binary (BOOTAA64.EFI) — fixes UEFI Shell drop
          grub-mkstandalone \
            --format=arm64-efi \
            --output="${ISO_DIR}/EFI/BOOT/BOOTAA64.EFI" \
            --modules="part_gpt part_msdos fat iso9660 linux normal boot configfile \
              loopback chain efifwsetup efi_gop ls search search_label \
              search_fs_uuid search_fs_file gfxterm test all_video loadenv ext2" \
            "boot/grub/grub.cfg=${ISO_DIR}/boot/grub/grub.cfg"

          # EFI partition image (FAT12, 4 MB) embedded in ISO
          EFI_IMG="${ISO_DIR}/boot/grub/efi.img"
          dd if=/dev/zero of="${EFI_IMG}" bs=1M count=4
          mkfs.vfat "${EFI_IMG}"
          mmd  -i "${EFI_IMG}" ::/EFI ::/EFI/BOOT
          mcopy -i "${EFI_IMG}" "${ISO_DIR}/EFI/BOOT/BOOTAA64.EFI" \
            ::/EFI/BOOT/BOOTAA64.EFI

          sudo chmod -R a+rX "${ISO_DIR}"

          # Build UEFI-bootable ISO (El Torito EFI entry)
          sudo xorriso -as mkisofs \
            -r -V "IgnisOS_${VER}" \
            -J -joliet-long \
            -no-emul-boot \
            -e boot/grub/efi.img \
            -isohybrid-gpt-basdat \
            -o "build/IgnisOS-${VER}-arm64.iso" "${ISO_DIR}"
          echo "ISO: $(du -sh build/IgnisOS-${VER}-arm64.iso | cut -f1)"

          cp "build/IgnisOS-${VER}-arm64.iso" "IgnisOS-${VER}-live-arm64.iso"
          cp "build/IgnisOS-${VER}-arm64.iso" "IgnisOS-${VER}-install-arm64.iso"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: IgnisOS-${{ steps.ver.outputs.version }}-arm64
          path: |
            IgnisOS-${{ steps.ver.outputs.version }}-live-arm64.iso
            IgnisOS-${{ steps.ver.outputs.version }}-install-arm64.iso
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: IgnisOS ${{ steps.ver.outputs.version }}
          body: |
            ## 🔥 IgnisOS ${{ steps.ver.outputs.version }} — ARM64 Linux

            > **ARM64 only** — Raspberry Pi 4/5, Apple M1/M2/M3/M4 (UTM), QEMU, AWS Graviton

            ### Run on Apple M-series (UTM)
            1. Download [UTM](https://mac.getutm.app/)
            2. `+` → **Virtualize** → **Linux**
            3. Select the ISO → RAM 2048MB+ → 20GB disk → Save → Play

            ### Run in QEMU
            ```bash
            qemu-system-aarch64 -M virt -cpu cortex-a72 -m 2048 \
              -bios /usr/share/qemu-efi-aarch64/QEMU_EFI.fd \
              -drive if=virtio,format=raw,file=IgnisOS-${{ steps.ver.outputs.version }}-live-arm64.iso \
              -device virtio-gpu-pci -display sdl \
              -device usb-kbd -device usb-mouse -usb
            ```
          files: |
            IgnisOS-${{ steps.ver.outputs.version }}-live-arm64.iso
            IgnisOS-${{ steps.ver.outputs.version }}-install-arm64.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
