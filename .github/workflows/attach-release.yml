name: Attach ISO to Release

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Build run ID to get artifacts from'
        required: true
        default: '25048559593'

jobs:
  attach:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact from previous build
        uses: actions/download-artifact@v4
        with:
          name: IgnisOS-1.0.0-arm64
          run-id: ${{ github.event.inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ./iso/

      - name: List files
        run: ls -lh ./iso/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          files: ./iso/*.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
